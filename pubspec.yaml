name: bechakena
description: "Offline-first supermarket POS & inventory for Bangladesh."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  drift: ^2.34.1
  intl: ^0.20.2
  uuid: ^4.5.3
  path_provider: ^2.1.6
  path: ^1.9.1
  sqlite3_flutter_libs: ^0.6.0+eol
  file_selector: ^1.1.0
  flutter_animate: ^4.5.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4

flutter:
  generate: true
  uses-material-design: true
