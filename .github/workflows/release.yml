name: Release builds

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Zip Windows bundle
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath BechaKena-windows-${{ github.ref_name }}.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: BechaKena-windows-${{ github.ref_name }}.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      # Debug-signed until a shop release keystore is configured.
      - run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk BechaKena-${{ github.ref_name }}.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: BechaKena-${{ github.ref_name }}.apk
